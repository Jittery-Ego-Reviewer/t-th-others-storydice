<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇怪故事機 - 🗣️</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght=300..700&family=Noto+Sans+TC:wght=400;500;700;900&display=swap');
        
        body {
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            background-color: #FEFBEA; /* パステルイエローの背景 */
        }

        /* 絵文字の3Dポップアップアニメーション */
        @keyframes pop-in {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            70% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .emoji-pop {
            animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
        }

        /* スロットの回転アニメーション効果 */
        @keyframes roll {
            0% { transform: translateY(0); }
            20% { transform: translateY(-6px); }
            40% { transform: translateY(10px); }
            60% { transform: translateY(-4px); }
            80% { transform: translateY(2px); }
            100% { transform: translateY(0); }
        }

        .roll-anim {
            animation: roll 0.5s cubic-bezier(0.45, 0, 0.55, 1);
        }

        /* 未開封スロットの揺れ効果（クリックを促す） */
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            75% { transform: rotate(2deg); }
        }

        .wiggle-hover:hover {
            animation: wiggle 0.3s ease infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-3 md:p-6 text-slate-800">

    <!-- ヘッダーセクション -->
    <header class="w-full max-w-4xl text-center mb-4 mt-2">
        <h1 class="text-3xl md:text-4xl font-extrabold text-amber-900 tracking-tight drop-shadow-sm mb-1.5">
            🗣️ 奇怪故事機
        </h1>
        <p class="text-xs md:text-sm text-amber-800 font-medium max-w-xl mx-auto opacity-90 leading-relaxed px-2">
            點擊骰子逐個揭曉，拼湊出一個天馬行空的故事吧！
        </p>
    </header>

    <!-- メインコンテンツコンテナ -->
    <main class="w-full max-w-4xl bg-white/70 backdrop-blur-md rounded-2xl p-4 md:p-6 shadow-lg border-2 md:border-4 border-amber-200/50 flex-grow flex flex-col justify-between">
        
        <!-- ゲームコントロールとモード選択 -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-3 mb-4 pb-4 border-b-2 border-dashed border-amber-100">
            <!-- モード切り替え -->
            <div class="flex bg-amber-100/60 p-1 rounded-xl w-full sm:w-auto">
                <button id="btn-easy" onclick="setMode('easy')" class="flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg font-bold text-xs md:text-sm transition-all duration-300 shadow-sm bg-white text-amber-900">
                    <span class="text-base">🌟</span>
                    容易模式 (9格)
                </button>
                <button id="btn-hard" onclick="setMode('hard')" class="flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg font-bold text-xs md:text-sm transition-all duration-300 text-amber-700 hover:text-amber-900">
                    <span class="text-base">🔥</span>
                    困難模式 (4格)
                </button>
            </div>

            <!-- アクションボタン -->
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="resetGame()" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 bg-amber-500 hover:bg-amber-600 active:scale-95 text-white font-bold px-4 py-2 rounded-xl text-xs md:text-sm shadow transition-all duration-200">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    重新開始
                </button>
                <button id="btn-reveal-all" onclick="revealAll()" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-bold px-4 py-2 rounded-xl text-xs md:text-sm shadow transition-all duration-200">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    全開！
                </button>
            </div>
        </div>

        <!-- スロットグリッドエリア -->
        <div class="flex-grow flex items-center justify-center py-4">
            <div id="slots-grid" class="grid gap-3 md:gap-4 w-full max-w-2xl justify-center items-center">
                <!-- 動的に生成されるスロットがここに入ります -->
            </div>
        </div>

    </main>

    <!-- ゲームロジック -->
    <script>
        // 音素リスト
        // /t-/ 塞音（不送気音）
        const tSounds = [
            { emoji: '😎', name: '戴黑超' },
            { emoji: '🐬', name: '海豚' },
            { emoji: '🦋', name: '蝴蝶' },
            { emoji: '🧘‍♀️', name: '打坐' },
            { emoji: '🧘‍♂️', name: '打坐' },
            { emoji: '🧘', name: '打坐' },
            { emoji: '🏌️‍♀️', name: '打高爾夫球' },
            { emoji: '⛹️‍♂️', name: '打籃球' },
            { emoji: '🤸', name: '打側手翻/打關斗' },
            { emoji: '🩲', name: '底褲' },
            { emoji: '👜', name: '手袋' },
            { emoji: '🛍️', name: '購物袋' },
            { emoji: '🥇', name: '第一名' },
            { emoji: '📢', name: '大喇叭/大聲公' },
            { emoji: '🎮', name: '打機' },
            { emoji: '🥁', name: '打鼓' },
            { emoji: '🔪', name: '刀' },
            { emoji: '💣', name: '炸彈' },
            { emoji: '☎️', name: '電話' },
            { emoji: '📱', name: '電話' },
            { emoji: '💻', name: '電腦' },
            { emoji: '💿', name: '光碟' },
            { emoji: '📺', name: '電視' },
            { emoji: '🔍', name: '放大鏡' },
            { emoji: '🔦', name: '手電筒' },
            { emoji: '💡', name: '燈膽' },
            { emoji: '📌', name: '圖釘' },
            { emoji: '✂️', name: '剪刀' },
            { emoji: '🍳', name: '煎蛋' },
            { emoji: '🥚', name: '雞蛋' },
            { emoji: '🍝', name: '意大利粉' },
            { emoji: '🎂', name: '蛋糕' },
            { emoji: '🍰', name: '蛋糕' },
            { emoji: '🧁', name: '迷你蛋糕' },
            { emoji: '🫗', name: '倒水' },
            { emoji: '🍴', name: '刀叉' },
            { emoji: '🍓', name: '士多啤梨' },
            { emoji: '🚲', name: '單車' },
            { emoji: '🚦', name: '交通燈/紅綠燈' },
            { emoji: '🗺️', name: '地圖' },
            { emoji: '⚡', name: '閃電' }
        ];

        // /th-/ 塞音（送気音）
        const thSounds = [
            { emoji: '🌻', name: '太陽花' },
            { emoji: '👩‍🚀', name: '太空人' },
            { emoji: '💃', name: '跳舞' },
            { emoji: '🕺', name: '跳舞' },
            { emoji: '🛝', name: '滑梯' },
            { emoji: '🕶️', name: '太陽眼鏡' },
            { emoji: '🩴', name: '拖鞋' },
            { emoji: '🎶', name: '聽歌' },
            { emoji: '🪜', name: '梯' },
            { emoji: '🗑️', name: '垃圾桶' },
            { emoji: '🍬', name: '糖果' },
            { emoji: '🍭', name: '波板糖' },
            { emoji: '🍯', name: '蜜糖' },
            { emoji: '🍇', name: '提子' },
            { emoji: '🧄', name: '蒜頭' },
            { emoji: '🛸', name: '太空船' },
            { emoji: '🚤', name: '快艇' },
            { emoji: '🧯', name: '滅火筒' }
        ];

        // その他の音（創造性とストーリー展開用）
        const otherSounds = [
            { emoji: '🤡', name: '小丑' },
            { emoji: '🤖', name: '機器人' },
            { emoji: '🐶', name: '小狗' },
            { emoji: '🦒', name: '長頸鹿' },
            { emoji: '🐭', name: '老鼠' },
            { emoji: '🐸', name: '青蛙' },
            { emoji: '🐻‍❄️', name: '北極熊' },
            { emoji: '🐔', name: '雞' },
            { emoji: '🐁', name: '老鼠' },
            { emoji: '🐍', name: '蛇' },
            { emoji: '🐳', name: '大鯨魚' },
            { emoji: '🏇', name: '騎馬' },
            { emoji: '👑', name: '皇冠' },
            { emoji: '💄', name: '唇膏' },
            { emoji: '⚽', name: '足球' },
            { emoji: '🏀', name: '籃球' },
            { emoji: '🏸', name: '羽毛球' },
            { emoji: '🌭', name: '熱狗' },
            { emoji: '🍦', name: '雪糕' },
            { emoji: '🌶️', name: '辣椒' },
            { emoji: '✈️', name: '飛機' },
            { emoji: '💬', name: '說話' }
        ];

        // Web Audioシンセサイザー（効果音用）
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'roll') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } else if (type === 'reveal') {
                const now = audioCtx.currentTime;
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08);
                osc.frequency.setValueAtTime(783.99, now + 0.16);
                osc.frequency.setValueAtTime(1046.50, now + 0.24);
                
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                
                osc.start();
                osc.stop(now + 0.35);
            } else if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.04);
            }
        }

        // ゲーム状態
        let currentMode = 'easy'; // デフォルトは容易模式（9格）
        let gameState = [];       // 各スロットの状態を保持する配列
        let isAllRevealing = false; // 全開処理中かどうかのフラグ

        // モード変更の設定
        function setMode(mode) {
            if (isAllRevealing) return; // 全開中のモード変更を防止
            playSound('click');
            currentMode = mode;
            
            const btnEasy = document.getElementById('btn-easy');
            const btnHard = document.getElementById('btn-hard');
            
            if (mode === 'easy') {
                btnEasy.className = "flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg font-bold text-xs md:text-sm transition-all duration-300 shadow-sm bg-white text-amber-900";
                btnHard.className = "flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg font-bold text-xs md:text-sm transition-all duration-300 text-amber-700 hover:text-amber-900";
            } else {
                btnHard.className = "flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg font-bold text-xs md:text-sm transition-all duration-300 shadow-sm bg-white text-amber-900";
                btnEasy.className = "flex-1 sm:flex-initial flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg font-bold text-xs md:text-sm transition-all duration-300 text-amber-700 hover:text-amber-900";
            }

            resetGame();
        }

        // スロットデータの生成：
        // - 容易模式 (Easy Mode): 9格。少なくとも 6/7 個は /t-/ か /th-/ (ターゲット音) にする必要があります。
        // - 困難模式 (Hard Mode): 4格。少なくとも 3 個は /t-/ か /th-/ (ターゲット音) にする必要があります。
        function generateSlotsData(mode) {
            const numSlots = mode === 'easy' ? 9 : 4;
            const minTargets = mode === 'easy' ? 6 : 3;
            
            let targetCount = minTargets;
            if (mode === 'easy') {
                targetCount = Math.random() < 0.5 ? 6 : 7;
            }

            const otherCount = numSlots - targetCount;

            function getRandomElements(sourceArray, count) {
                const shuffled = [...sourceArray].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, count);
            }

            const allTargets = [
                ...tSounds.map(item => ({ ...item, type: 't' })), 
                ...thSounds.map(item => ({ ...item, type: 'th' }))
            ];
            
            const targetsSelected = getRandomElements(allTargets, targetCount);
            const othersSelected = getRandomElements(otherSounds.map(item => ({ ...item, type: 'other' })), otherCount);

            const combined = [...targetsSelected, ...othersSelected];
            const finalShuffled = combined.sort(() => 0.5 - Math.random());

            return finalShuffled.map((item, index) => ({
                id: index,
                emoji: item.emoji,
                name: item.name,
                type: item.type,
                revealed: false,
                rolling: false
            }));
        }

        // スロットをUIグリッドにレンダリング
        function renderSlots() {
            const grid = document.getElementById('slots-grid');
            grid.innerHTML = '';

            if (currentMode === 'easy') { // 9マスのグリッド
                grid.className = "grid grid-cols-3 gap-2 md:gap-4 w-full max-w-xl mx-auto justify-center items-center";
            } else { // 4マスのグリッド
                grid.className = "grid grid-cols-2 gap-3 md:gap-5 w-full max-w-md mx-auto justify-center items-center";
            }

            gameState.forEach((slot, index) => {
                const card = document.createElement('div');
                
                if (slot.revealed) {
                    // ターゲット音かどうかによってマイルドな背景色を設定（バッジ表示はなし、セラピストの判断サポート用）
                    let bgCol = "bg-white border-amber-200";
                    if (slot.type === 't') {
                        bgCol = "bg-rose-50/70 border-rose-200";
                    } else if (slot.type === 'th') {
                        bgCol = "bg-sky-50/70 border-sky-200";
                    }

                    const emojiSizeClass = currentMode === 'easy' ? 'text-5xl sm:text-6xl md:text-7xl' : 'text-6xl sm:text-7xl md:text-8xl';

                    // 完全に展開されたカードは学生の余計な入力を防ぐため、クリック不可（ポインター、ホバー、モーダルを排除）
                    card.className = `relative flex flex-col items-center justify-center aspect-square rounded-xl md:rounded-2xl border-2 md:border-4 ${bgCol} shadow-sm w-full p-2 cursor-default select-none`;
                    
                    card.innerHTML = `
                        <div class="${emojiSizeClass} emoji-pop drop-shadow-sm">${slot.emoji}</div>
                    `;
                } else if (slot.rolling) {
                    card.className = "flex flex-col items-center justify-center aspect-square rounded-xl md:rounded-2xl bg-amber-50 border-2 md:border-4 border-amber-400/80 roll-anim shadow-inner w-full p-2 select-none";
                    
                    const rollEmojiSize = currentMode === 'easy' ? 'text-2xl sm:text-4xl' : 'text-3xl sm:text-5xl';
                    card.innerHTML = `
                        <div class="${rollEmojiSize} animate-pulse filter blur-[0.5px]">🎲</div>
                        <span class="text-[8px] sm:text-[10px] text-amber-500 font-bold mt-1">旋轉...</span>
                    `;
                } else {
                    card.className = "group flex flex-col items-center justify-center aspect-square rounded-xl md:rounded-2xl bg-white hover:bg-amber-50/50 border-2 md:border-4 border-amber-200/60 hover:border-amber-400 cursor-pointer transition-all duration-300 wiggle-hover shadow-sm active:scale-95 w-full p-2 select-none";
                    
                    const numSize = currentMode === 'easy' ? 'w-8 h-8 sm:w-12 sm:h-12 text-sm sm:text-xl' : 'w-10 h-10 sm:w-14 sm:h-14 text-xl sm:text-2xl';
                    card.innerHTML = `
                        <div class="${numSize} rounded-full bg-amber-100 group-hover:bg-amber-200 flex items-center justify-center text-amber-600 font-extrabold shadow-sm transition-all">
                            ${index + 1}
                        </div>
                        <span class="text-[8px] sm:text-[10px] text-slate-400 font-bold mt-1.5 uppercase tracking-wider group-hover:text-amber-700 transition-colors">點擊</span>
                    `;
                    card.onclick = () => rollSlot(index);
                }

                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // スロットクリック時の回転アニメーション処理（非同期化して1個ずつの順次回転にも対応可能に設計）
        function rollSlot(index) {
            return new Promise((resolve) => {
                if (gameState[index].revealed || gameState[index].rolling) {
                    resolve();
                    return;
                }

                gameState[index].rolling = true;
                renderSlots();

                let rolls = 0;
                const rollInterval = setInterval(() => {
                    playSound('roll');
                    rolls++;
                    if (rolls >= 4) {
                        clearInterval(rollInterval);
                        gameState[index].rolling = false;
                        gameState[index].revealed = true;
                        playSound('reveal');
                        renderSlots();
                        resolve();
                    }
                }, 100);
            });
        }

        // 全てのスロットを順番に1個ずつロールアニメーションを伴って公開（全開モード）
        async function revealAll() {
            if (isAllRevealing) return;
            isAllRevealing = true;

            // コントロールボタンの一時無効化処理
            const btnRevealAll = document.getElementById('btn-reveal-all');
            if (btnRevealAll) {
                btnRevealAll.disabled = true;
                btnRevealAll.classList.add('opacity-50', 'cursor-not-allowed');
            }

            for (let i = 0; i < gameState.length; i++) {
                if (!gameState[i].revealed && !gameState[i].rolling) {
                    await rollSlot(i);
                    // 次の回転スロット開始までの間にマイルドな待機時間を追加
                    await new Promise(r => setTimeout(r, 120));
                }
            }

            isAllRevealing = false;
            if (btnRevealAll) {
                btnRevealAll.disabled = false;
                btnRevealAll.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // ゲームのリセット
        function resetGame() {
            if (isAllRevealing) return; // ロール進行中はリセット不可
            playSound('click');
            gameState = generateSlotsData(currentMode);
            renderSlots();
        }

        // アプリ起動時の初期セットアップ
        window.onload = () => {
            lucide.createIcons();
            gameState = generateSlotsData(currentMode);
            renderSlots();
        };
    </script>
</body>
</html>
